const container = document.getElementById('network');
const data = {
  nodes: new vis.DataSet(nodesData),
  edges: new vis.DataSet(edgesData),
};

const options = {
  nodes: {
    shape: 'dot',
    borderWidth: 1,
    shadow: true,
  },
  edges: {
    arrows: { to: { enabled: false } },
  },
  physics: {
    enabled: true,
    barnesHut: {
      gravitationalConstant: -8000,
      centralGravity: 0.3,
      springLength: 130,
      springConstant: 0.05,
      damping: 0.09,
      avoidOverlap: 0.1,
    },
    stabilization: { iterations: 400, updateInterval: 25 },
  },
  interaction: {
    hover: true,
    dragNodes: true,
    dragView: true,
    zoomView: true,
    navigationButtons: true,
    keyboard: true,
    tooltipDelay: 200,
  },
};

const network = new vis.Network(container, data, options);

// Once layout stabilizes, freeze physics so nodes sit still
network.on('stabilizationIterationsDone', function() {
  network.setOptions({ physics: { enabled: false } });
  document.getElementById('stabilize-msg').textContent = '✓ Layout ready — drag nodes to rearrange';
  setTimeout(() => {
    document.getElementById('stabilize-msg').style.display = 'none';
  }, 2000);
});

// Click handler — show node or edge info in sidebar
network.on('click', function(params) {
  const panel = document.getElementById('info-panel');

  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = data.nodes.get(nodeId);
    panel.innerHTML = node.info || '<i>No info available</i>';

  } else if (params.edges.length > 0) {
    const edgeId = params.edges[0];
    const edge = data.edges.get(edgeId);
    const fromNode = data.nodes.get(edge.from);
    const toNode   = data.nodes.get(edge.to);
    panel.innerHTML =
      (edge.info || '<i>No info available</i>') +
      '<hr style="border-color:#0f3460;margin:10px 0">' +
      '<b>From:</b> ' + (fromNode ? fromNode.label : edge.from) + '<br>' +
      '<b>To:</b> '   + (toNode   ? toNode.label   : edge.to);

  } else {
    panel.innerHTML = '<span style="color:#555">Click a node or edge to see details.</span>';
  }
});
